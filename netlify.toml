# ═══════════════════════════════════════════════════════
#  WayPoint — Netlify Configuration
#  Credentials are set in Netlify Dashboard, never here.
# ═══════════════════════════════════════════════════════

[build]
  command   = "node build.js"
  publish   = "dist"

# ── Headers: security hardening ────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(self), accelerometer=(self), gyroscope=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://api.qrserver.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://api.qrserver.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com; media-src 'self' blob:; worker-src 'self' blob:"

# ── Cache: long-lived for icons/assets ─────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# ── Redirects: SPA fallback ────────────────────────────
[[redirects]]
  from   = "/nav"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
