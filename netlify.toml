# ═══════════════════════════════════════════════════════
#  WayPoint — Netlify Configuration
#  Credentials are set in Netlify Dashboard, never here.
# ═══════════════════════════════════════════════════════

[build]
  command   = "node build.js"
  publish   = "dist"

# ── Headers: security hardening ────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(self), accelerometer=(self), gyroscope=(self)"

# ── Cache: long-lived for icons/assets ─────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# ── Redirects: SPA fallback ────────────────────────────
[[redirects]]
  from   = "/nav"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
