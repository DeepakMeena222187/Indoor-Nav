# ═══════════════════════════════════════════════════════
#  WayPoint — Netlify Configuration
#
#  ── REQUIRED SETUP (one-time, in Netlify Dashboard) ────
#
#  Go to: Site Configuration → Environment Variables
#  Add these two variables:
#
#    FIREBASE_PROJECT_ID   →  your Firebase project ID
#                              e.g.  indoor-nav-59cd2
#
#    FIREBASE_API_KEY      →  your Firebase web API key
#                              e.g.  AIzaSyBTzj9w1E22hbRsMo4...
#
#  Find them: Firebase Console → ⚙ Project Settings
#             → Your apps → Web app → firebaseConfig
#             → copy  projectId  and  apiKey
#
#  Never put real credentials in this file — it is public.
# ═══════════════════════════════════════════════════════

[build]
  command   = "node build.js"
  publish   = "dist"

# Node version (build.js requires ≥16)
[build.environment]
  NODE_VERSION = "18"

# ── Security headers ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(self), accelerometer=(self), gyroscope=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://api.qrserver.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://api.qrserver.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com; media-src 'self' blob:; worker-src 'self' blob:"

# ── Cache: long-lived for icons ─────────────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must not be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# config.js must not be cached (credentials can be rotated)
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Redirects ───────────────────────────────────────────
[[redirects]]
  from   = "/nav"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200